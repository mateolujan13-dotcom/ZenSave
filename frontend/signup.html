<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Zen Save - Únete al Santuario</title>
<script src="js/theme.js"></script>
<link rel="stylesheet" href="css/app.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&amp;family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&amp;display=block" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet"/>
<style>
        .glow-orb {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(0,230,118,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
            animation: float 20s infinite ease-in-out alternate;
        }
        .glow-orb-2 {
            position: absolute;
            width: 30vw;
            height: 30vw;
            background: radial-gradient(circle, rgba(84,224,131,0.1) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
            bottom: -10vh;
            right: -10vw;
            animation: float2 25s infinite ease-in-out alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(5vw, 5vh); }
        }
        @keyframes float2 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-8vw, -3vh); }
        }

        /* Corrección de autocompletado para modo oscuro */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #131313 inset !important;
            -webkit-text-fill-color: #dbe5d9 !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        .light { --color-bg: #F0F4F0; }
        .light body { background-color: #F0F4F0 !important; color: #2A3A2A !important; }
        .light .bg-background { background-color: #F0F4F0 !important; }
        .light .bg-surface { background-color: #FAFBFA !important; }
        .light .text-on-surface { color: #2A3A2A !important; }
        .light .text-on-surface-variant { color: #5A6E5A !important; }
        .light .text-primary { color: #006D35 !important; }
        .light .border-border-subtle { border-color: rgba(0,0,0,0.06) !important; }
        .light input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #EDF2ED inset !important; -webkit-text-fill-color: #2A3A2A !important; }
    .light .bg-surface-container { background-color: #E8EDE8 !important; }
    .light .bg-primary-container { background-color: #00C853 !important; }
    .light .text-on-primary-container { color: #FFFFFF !important; }
    .light .hover\:bg-primary:hover { background-color: #006D35 !important; }
    .light .hover\:text-primary:hover { color: #006D35 !important; }
    .light .hover\:text-on-surface:hover { color: #2A3A2A !important; }
    .light .bg-error-container\/20 { background-color: rgba(198, 40, 40, 0.08) !important; }
    .light .border-error\/30 { border-color: rgba(198, 40, 40, 0.25) !important; }
    .light .text-error { color: #C62828 !important; }
    .light .focus-within\:ring-primary\/50:focus-within { --tw-ring-color: rgba(0, 109, 53, 0.3) !important; }
    .light .glow-orb { background: radial-gradient(circle, rgba(0, 109, 53, 0.08) 0%, rgba(0,0,0,0) 70%) !important; }
    .light .glow-orb-2 { background: radial-gradient(circle, rgba(0, 109, 53, 0.05) 0%, rgba(0,0,0,0) 70%) !important; }
    </style>

    <script>
        if (localStorage.getItem('zen_token')) {
            window.location.href = 'panel-financiero.html';
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center relative overflow-hidden p-margin-page">
<!-- Orbes ambientales -->
<div class="glow-orb top-[-10vh] left-[-10vw]"></div>
<div class="glow-orb-2"></div>
<!-- Encabezado / Marca -->
<div class="mb-8 text-center z-10 flex flex-col items-center">
<h1 class="font-headline-lg text-headline-lg text-primary drop-shadow-[0_0_15px_rgba(117,255,158,0.3)] tracking-tight">Zen Save</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Únete al Santuario</p>
</div>
<!-- Tarjeta de registro -->
<main class="w-full max-w-md bg-surface border border-border-subtle rounded-[24px] p-card-padding z-10 shadow-2xl backdrop-blur-sm relative group overflow-hidden">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,rgba(255,255,255,0.03)_0%,transparent_50%)] pointer-events-none transition-opacity duration-500 opacity-50 group-hover:opacity-100"></div>
<form id="register-form" class="flex flex-col gap-stack-gap relative z-10">
<div id="register-error" class="hidden bg-error-container/20 border border-error/30 text-error p-3 rounded-lg text-sm mb-2"></div>
<div class="flex flex-col gap-2">
<label class="font-body-md text-body-md text-on-surface" for="fullName">Nombre Completo</label>
<div class="relative flex items-center focus-within:ring-1 focus-within:ring-primary/50 rounded-lg bg-surface-container transition-shadow duration-300">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant select-none" data-icon="person">person</span>
<input class="w-full bg-transparent border-none py-3 pl-10 pr-4 text-on-surface font-data-label text-data-label placeholder:text-on-surface-variant/50 focus:ring-0 rounded-lg outline-none" id="fullName" name="name" required placeholder="Tu nombre completo" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-body-md text-body-md text-on-surface" for="email">Correo Electrónico</label>
<div class="relative flex items-center focus-within:ring-1 focus-within:ring-primary/50 rounded-lg bg-surface-container transition-shadow duration-300">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant select-none" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-none py-3 pl-10 pr-4 text-on-surface font-data-label text-data-label placeholder:text-on-surface-variant/50 focus:ring-0 rounded-lg outline-none" id="email" name="email" required placeholder="ejemplo@correo.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-body-md text-body-md text-on-surface" for="password">Contraseña</label>
<div class="relative flex items-center focus-within:ring-1 focus-within:ring-primary/50 rounded-lg bg-surface-container transition-shadow duration-300">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant select-none" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none py-3 pl-10 pr-4 text-on-surface font-data-label text-data-label placeholder:text-on-surface-variant/50 focus:ring-0 rounded-lg outline-none" id="password" name="password" required placeholder="••••••••" type="password"/>
<button class="absolute right-3 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="mt-4 w-full bg-primary-container text-on-primary-container font-headline-md text-body-md font-bold py-3 rounded-full shadow-[0_0_20px_rgba(0,230,118,0.2)] hover:shadow-[0_0_30px_rgba(0,230,118,0.4)] hover:bg-primary transition-all duration-300 active:scale-95" type="submit">
                Crear Cuenta
            </button>
<div class="mt-4 text-center">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors duration-300" href="index.html">
                    ¿Ya tienes una cuenta? <span class="text-on-surface border-b border-on-surface/30 hover:border-primary">Iniciar sesión</span>
</a>
</div>
</form>
</main>
<script>
        // Alternar visibilidad de contraseña
        const togglePassword = document.querySelector('button[type="button"] span.material-symbols-outlined[data-icon="visibility"]');
        const passwordInput = document.getElementById('password');

        if (togglePassword && passwordInput) {
            togglePassword.parentElement.addEventListener('click', function (e) {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                if(type === 'password') {
                    togglePassword.textContent = 'visibility';
                    togglePassword.setAttribute('data-icon', 'visibility');
                } else {
                    togglePassword.textContent = 'visibility_off';
                    togglePassword.setAttribute('data-icon', 'visibility_off');
                }
            });
        }
    </script>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body></html>
