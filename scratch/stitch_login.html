<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Zen Save - Login</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {

                        "on-primary-fixed-variant": "#005226",
                        "on-primary": "#003918",
                        "on-error-container": "#ffdad6",
                        "error": "#ffb4ab",
                        "primary": "#75ff9e",
                        "border-subtle": "rgba(255, 255, 255, 0.05)",
                        "surface-container-low": "#151e16",
                        "surface-container": "#19221a",
                        "tertiary-container": "#ffba79",

                        "on-tertiary-fixed-variant": "#6a3c03",
                        "secondary-container": "#00ad57",
                        "tertiary-fixed-dim": "#fdb878",
                        "on-secondary-container": "#003717",
                        "on-primary-container": "#00612e",
                        "background": "#131313",
                        "inverse-surface": "#dbe5d9",
                        "surface-dim": "#0d150e",
                        "surface-container-lowest": "#081009",
                        "error-container": "#93000a",
                        "warning-amber": "#FFD54F",
                        "surface-container-highest": "#2e372e",
                        "on-secondary": "#003918",
                        "expense-red": "#FFB4AB",
                        "surface-bright": "#323c33",
                        "surface": "#1A1A1A",
                        "on-error": "#690005",
                        "outline": "#859585",
                        "secondary": "#54e083",
                        "on-tertiary-container": "#794810",
                        "outline-variant": "#3b4a3d",
                        "on-tertiary": "#4b2800",
                        "inverse-on-surface": "#29332a",

                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "stack-gap": "1rem",
                        "gutter": "1.5rem",
                        "margin-page": "2rem",
                        "card-padding": "1.5rem"
                    },
                    fontFamily: {
                        "body-md": ["Hanken Grotesk"],
                        "data-display": ["JetBrains Mono"],
                        "headline-lg": ["Hanken Grotesk"],
                        "data-label": ["JetBrains Mono"],

                    },
                    fontSize: {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],

<style>
        /* Custom Utilities to supplement config restrictions safely */
        .glass-panel {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-body-md">
<!-- Atmospheric Orbs (Deep Immersion & Depth) -->
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>
<main class="w-full max-w-[420px] px-margin-page z-10 flex flex-col items-center">
<!-- Brand Centerpiece -->
<div class="flex flex-col items-center mb-10">
<div class="relative mb-4">
<div class="absolute inset-0 bg-primary/30 blur-2xl rounded-full"></div>
<span class="material-symbols-outlined text-primary text-6xl relative z-10 drop-shadow-[0_0_15px_rgba(117,255,158,0.8)]" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Zen Save</h1>
</div>
<!-- Login Form Card -->
<div class="w-full bg-surface border border-border-subtle rounded-[24px] p-card-padding relative group overflow-hidden shadow-2xl">
<!-- Subtle Hover Glow Integration -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/0 via-primary/0 to-primary/5 opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none"></div>
<div class="text-center mb-8 relative z-10">
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Bienvenido al Santuario</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Ingresa para gestionar tu energía financiera.</p>
</div>
<form class="flex flex-col gap-stack-gap relative z-10" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-data-label text-data-label text-on-surface-variant uppercase ml-1" for="email">Correo Electrónico</label>
<div class="relative group/input">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within/input:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-variant/30 border border-outline-variant rounded-xl py-3 pl-12 pr-4 font-data-display text-[16px] text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all shadow-sm focus:shadow-[0_0_15px_rgba(117,255,158,0.15)] placeholder:text-on-surface-variant/50" id="email" placeholder="usuario@santuario.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2 mt-2">
<div class="flex justify-between items-center">
<label class="font-data-label text-data-label text-on-surface-variant uppercase ml-1" for="password">Contraseña</label>
<a class="font-data-label text-data-label text-primary/80 hover:text-primary transition-colors" href="#">¿Olvidé mi contraseña?</a>
</div>
<div class="relative group/input">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within/input:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-variant/30 border border-outline-variant rounded-xl py-3 pl-12 pr-4 font-data-display text-[16px] text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all shadow-sm focus:shadow-[0_0_15px_rgba(117,255,158,0.15)] placeholder:text-on-surface-variant/50" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container rounded-full py-4 mt-6 font-body-md text-body-md font-bold hover:brightness-110 shadow-[0_0_20px_rgba(0,230,118,0.2)] hover:shadow-[0_0_30px_rgba(0,230,118,0.4)] transition-all duration-300 flex items-center justify-center gap-2" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Secondary Action -->
<div class="mt-8 text-center relative z-10">
<span class="font-body-md text-body-md text-on-surface-variant">¿No tienes una cuenta?</span>
<a class="font-body-md text-body-md text-primary ml-1 hover:underline underline-offset-4 transition-all" href="#">Crear una cuenta</a>
</div>
</div>
</main>
</body></html>
